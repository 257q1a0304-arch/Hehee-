<!DOCTYPE html>
<html>
<head>
    <title>Pyaari Si Quiz 💕</title>
</head>

<body style="text-align:center; font-family:Arial; background:#ffe6f0; padding:50px;">

<div style="background:white; padding:20px; border-radius:15px; display:inline-block;">
    
    <h2>Ek chhota sa sawaal 💭</h2>
    <p>Kya aap mujhe pasand karte hain? 😊</p>

    <button onclick="checkAnswer('yes')">Haan ji 💕</button>
    <button onclick="checkAnswer('no')">Nahi ji 😅</button>

    <p id="result"></p>
</div>

<script>
function checkAnswer(ans) {
    let result = document.getElementById("result");

    let yesReplies = [
        "Sach mein? 😊💖",
        "Aap bahut pyaare hain 😏💕",
        "Mujhe pehle se pata tha 😌",
        "Aapne dil jeet liya 💘"
    ];

    let noReplies = [
        "Ek baar phir sochiye na 😅",
        "Jhooth bolna theek nahi hai 😏",
        "Dil se jawab dijiye 😊",
        "Sach sach batayiye 💭"
    ];

    if(ans === "yes") {
        let random = Math.floor(Math.random() * yesReplies.length);
        result.innerHTML = yesReplies[random];
    } else {
        let random = Math.floor(Math.random() * noReplies.length);
        result.innerHTML = noReplies[random];
    }
}
</script>

</body>
</html>
