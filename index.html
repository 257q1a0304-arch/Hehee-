<!DOCTYPE html>
<html>
<head>
    <title>Pyaari Si Quiz 💕</title>
</head>

<body style="text-align:center; font-family:Arial; background:#ffe6f0; padding:50px;">

<div id="box" style="background:white; padding:25px; border-radius:15px; display:inline-block;">
    
    <h2 id="question">Ek chhota sa sawaal 💭</h2>
    <p id="text">Kya aap mujhe pasand karte hain? 😊</p>

    <button onclick="answer('yes')">Haan ji 💕</button>
    <button onclick="answer('no')">Nahi ji 😅</button>

    <p id="result"></p>
    <br>
    <button onclick="nextQuestion()">Next ➡️</button>

</div>

<script>
let current = 0;

let questions = [
    "Kya aap mujhe pasand karte hain? 😊",
    "Sach sach batayiye, thoda sa bhi? 😏",
    "Agar main samne aa jaun toh smile aayegi? 😄",
    "Ignore toh nahi karenge na? 🥺"
];

function answer(ans) {
    let result = document.getElementById("result");

    let yesReplies = [
        "Sach mein? 😊💖",
        "Aap bahut pyaare hain 😏",
        "Mujhe pehle se pata tha 😌",
        "Dil jeet liya aapne 💘"
    ];

    let noReplies = [
        "Ek baar phir sochiye na 😅",
        "Jhooth bolna theek nahi hai 😏",
        "Dil se jawab dijiye 😊",
        "Sach sach batayiye 💭"
    ];

    if(ans === "yes") {
        let r = Math.floor(Math.random() * yesReplies.length);
        result.innerHTML = yesReplies[r];
    } else {
        let r = Math.floor(Math.random() * noReplies.length);
        result.innerHTML = noReplies[r];
    }
}

function nextQuestion() {
    current++;
    if(current >= questions.length) {
        document.getElementById("text").innerHTML = "Bas itna hi 😊 Aapka din shubh ho 💕";
        document.getElementById("result").innerHTML = "";
        return;
    }

    document.getElementById("text").innerHTML = questions[current];
    document.getElementById("result").innerHTML = "";
}
</script>

</body>
</html>
